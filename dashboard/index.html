<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JAVIS</title>
<style>
  :root{ --cyan:#4fe3ff; --teal:#50f6c8; --purple:#8a6cff; --ink:#8fb0d0; --text:#e6f3ff; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; overflow:hidden; background:#02030a; color:var(--text);
    font-family:"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif; }
  #app{ position:fixed; inset:0; }
  #scene{ position:absolute; inset:0; display:block; }

  .brand{ position:absolute; top:20px; left:24px; z-index:5; pointer-events:none; }
  .brand h1{ margin:0; font-size:22px; letter-spacing:.44em; font-weight:700;
    background:linear-gradient(90deg,#8ff6ff,#7effd0,#c79bff); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .state{ margin-top:6px; font-size:12.5px; letter-spacing:.14em; color:var(--ink); display:flex; align-items:center; gap:8px; }
  .state .dot{ width:8px; height:8px; border-radius:50%; background:var(--teal); box-shadow:0 0 10px var(--teal); transition:.4s; }

  .badge{ position:absolute; top:22px; right:24px; z-index:5; font-size:11px; color:var(--ink);
    border:1px solid rgba(90,180,220,.18); border-radius:20px; padding:6px 13px; white-space:nowrap; }

  .transcript{ position:absolute; top:64px; right:16px; bottom:118px; width:340px; z-index:4;
    display:flex; flex-direction:column; gap:10px; overflow-y:auto; overflow-x:hidden; padding:10px 6px 10px 10px;
    overscroll-behavior:contain; scroll-behavior:smooth; pointer-events:auto; -webkit-overflow-scrolling:touch;
    -webkit-mask-image:linear-gradient(180deg,transparent,#000 26px,#000 calc(100% - 8px),transparent);
            mask-image:linear-gradient(180deg,transparent,#000 26px,#000 calc(100% - 8px),transparent);
    transition:opacity .3s, transform .3s; }
  .transcript.hidden{ opacity:0; transform:translateX(24px); pointer-events:none; }
  .transcript::-webkit-scrollbar{ width:6px; } .transcript::-webkit-scrollbar-thumb{ background:rgba(90,180,220,.18); border-radius:6px; }
  .row{ display:flex; } .row.me{ justify-content:flex-end; }
  .bubble{ max-width:88%; padding:10px 13px; border-radius:14px; font-size:14px; line-height:1.5; white-space:pre-wrap; word-wrap:break-word; backdrop-filter:blur(6px); }
  .me .bubble{ background:linear-gradient(135deg,rgba(37,99,168,.85),rgba(58,160,200,.8)); border-bottom-right-radius:4px; }
  .bot .bubble{ background:rgba(12,20,38,.62); border:1px solid rgba(90,180,220,.16); border-bottom-left-radius:4px; }

  .card{ background:rgba(12,20,38,.66); border:1px solid rgba(90,180,220,.18); border-radius:14px; padding:14px 15px; backdrop-filter:blur(6px); }
  .card .tag{ font-size:10px; letter-spacing:.2em; text-transform:uppercase; color:var(--teal); }
  .card h3{ margin:5px 0 10px; font-size:14.5px; color:#eaf6ff; }
  .steps{ list-style:none; margin:0; padding:0; } .steps li{ display:flex; gap:9px; padding:5px 0; }
  .steps .n{ flex:none; width:20px; height:20px; border-radius:50%; display:grid; place-items:center; font-size:11px; font-weight:700;
    color:#05070f; background:linear-gradient(135deg,#50f6c8,#4fe3ff); } .steps .t{ font-size:13px; padding-top:1px; }
  .acts{ display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; align-items:center; }
  .btn{ border:none; border-radius:9px; padding:8px 14px; font-size:13px; font-weight:600; cursor:pointer; }
  .btn.ok{ background:linear-gradient(135deg,#28c68a,#50f6c8); color:#05221a; }
  .btn.no{ background:transparent; color:#ff9a9a; border:1px solid rgba(255,120,120,.4); }
  .btn:disabled{ opacity:.5; cursor:default; }
  .open{ font-size:12px; color:var(--cyan); text-decoration:none; margin-left:auto; }
  pre.logs{ background:#03040c; border:1px solid rgba(90,180,220,.16); border-radius:10px; padding:10px 12px; margin:10px 0 2px;
    font-family:Consolas,monospace; font-size:11.5px; line-height:1.5; overflow-x:auto; white-space:pre-wrap; }
  .lg-ok{ color:#5cf0b0; } .lg-no{ color:#ff8a8a; } .lg-warn{ color:#ffcf6b; } .lg-add{ color:#7fe6ff; }
  .lg-run{ color:#8ab4ff; } .lg-dim{ color:#8fb0d0; } .lg-fix{ color:#e5a0ff; } .lg-task{ color:#eafcff; font-weight:700; }

  .wakehint{ position:absolute; left:50%; bottom:78px; transform:translateX(-50%); z-index:6; opacity:0; transition:.3s;
    font-size:11.5px; letter-spacing:.05em; color:#bff0ff; background:rgba(20,60,80,.5); border:1px solid rgba(79,227,255,.35);
    padding:5px 13px; border-radius:20px; backdrop-filter:blur(8px); pointer-events:none; text-align:center; }

  .composer{ position:absolute; left:50%; bottom:22px; transform:translateX(-50%); z-index:6;
    display:flex; gap:9px; align-items:center; width:min(620px,calc(100% - 32px));
    background:rgba(8,14,28,.72); border:1px solid rgba(90,180,220,.18); border-radius:16px; padding:8px; backdrop-filter:blur(10px); }
  .composer input[type=text]{ flex:1; background:transparent; border:none; color:var(--text); padding:9px 8px; font-size:14.5px; outline:none; }
  .icon{ width:42px; height:42px; flex:none; border-radius:11px; border:1px solid rgba(90,180,220,.18); background:rgba(12,20,38,.6);
    color:var(--cyan); font-size:17px; cursor:pointer; display:grid; place-items:center; transition:.15s; }
  .icon:hover{ border-color:rgba(79,227,255,.5); }
  .icon.on{ background:linear-gradient(135deg,#4fe3ff,#8a6cff); color:#05070f; border-color:transparent; }
  .icon.rec{ background:#e8455c; color:#fff; border-color:#e8455c; animation:blink 1s steps(2) infinite; }
  .send{ background:linear-gradient(135deg,#50f6c8,#4fe3ff); color:#05221a; border-color:transparent; }
  @keyframes blink{ 50%{ opacity:.55; } }
  @media (max-width:760px){ .transcript{ width:auto; left:12px; right:12px; } }
</style>
</head>
<body>
<div id="app">
  <canvas id="scene"></canvas>

  <div class="brand">
    <h1>JAVIS</h1>
    <div class="state"><span class="dot" id="dot"></span><span id="stateLabel">Đang chờ</span></div>
  </div>
  <div class="badge" id="badge">…</div>

  <aside class="transcript" id="transcript"></aside>
  <div class="wakehint" id="wakehint"></div>

  <div class="composer">
    <button class="icon" id="mic" title="Bật nghe rảnh tay">🎙️</button>
    <input type="text" id="inp" autocomplete="off" />
    <button class="icon on" id="tts" title="Đọc bằng giọng nói">🔊</button>
    <button class="icon send" id="send" title="Gửi">➤</button>
  </div>
</div>

<script>
"use strict";
// =====================================================================
//  JAVIS — thực thể sống: quả cầu hạt phản ứng theo trạng thái hội thoại
// =====================================================================
const root = document.getElementById('app');
const canvas = document.getElementById('scene');
const ctx = canvas.getContext('2d');
let W=0,H=0,DPR=Math.min(window.devicePixelRatio||1,2),cx=0,cy=0,R=0;
function resize(){ W=root.clientWidth; H=root.clientHeight; canvas.width=W*DPR; canvas.height=H*DPR;
  canvas.style.width=W+'px'; canvas.style.height=H+'px'; ctx.setTransform(DPR,0,0,DPR,0,0);
  cx=W/2; cy=H*0.46; R=Math.min(W,H)*0.30; }
window.addEventListener('resize',resize); resize();

const COLORS=[[80,246,200],[79,227,255],[232,92,255],[138,108,255],[255,154,60],[235,245,255]];
const rgba=(c,a)=>`rgba(${c[0]|0},${c[1]|0},${c[2]|0},${a})`;
function makeGlow(c){ const s=64,v=document.createElement('canvas'); v.width=v.height=s; const x=v.getContext('2d');
  const g=x.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2); g.addColorStop(0,rgba(c,1)); g.addColorStop(.35,rgba(c,.55)); g.addColorStop(1,rgba(c,0));
  x.fillStyle=g; x.fillRect(0,0,s,s); return v; }
const SPRITE=COLORS.map(makeGlow);
const drawGlow=(i,x,y,r,a)=>{ ctx.globalAlpha=a; ctx.drawImage(SPRITE[i],x-r,y-r,r*2,r*2); ctx.globalAlpha=1; };

function fib(i,n){ const off=2/n,inc=Math.PI*(3-Math.sqrt(5)); const y=i*off-1+off/2; const r=Math.sqrt(Math.max(0,1-y*y)); const p=i*inc;
  return [Math.cos(p)*r,y,Math.sin(p)*r]; }
const ORBS=[[0,.92,.18],[-.82,.3,.34],[.8,.16,-.34],[-.28,-.86,.22],[.42,-.7,-.4]].map(v=>{const m=Math.hypot(...v);return v.map(k=>k/m);});
const DUST=[]; (function(){ for(let k=0;k<460;k++){ const u=Math.random()*2-1,t=Math.random()*6.2832,r=Math.sqrt(1-u*u);
  const spark=Math.random()<.14, rad=spark?1.05+Math.random()*.5:.8+Math.random()*.28; let ci; const q=Math.random();
  ci=spark?[2,3,4][(Math.random()*3)|0]:(q<.5?1:q<.72?0:q<.9?5:(q<.96?3:2));
  DUST.push({x:r*Math.cos(t)*rad,y:u*rad,z:r*Math.sin(t)*rad,ci,base:.25+Math.random()*.6,tw:Math.random()*6.28,sz:.7+Math.random()*1.1,
    jx:Math.random()*6.28,jy:Math.random()*6.28}); } })();

let nodes=[], edges=[];
function buildNodes(names){
  const M=Math.max(14, names.length);
  nodes=[];
  for(let i=0;i<M;i++){ const p=fib(i,M); const real=i<names.length;
    nodes.push({x:p[0],y:p[1],z:p[2],ci:i%5,real,name:real?names[i]:null,sx:0,sy:0,d:0}); }
  edges=[]; const n=nodes.length, TH=.82, CAP=6, seen=new Set();
  for(let i=0;i<n;i++){ const a=nodes[i],ds=[]; for(let j=0;j<n;j++){ if(j===i)continue; const b=nodes[j];
      ds.push([Math.hypot(a.x-b.x,a.y-b.y,a.z-b.z),j]); } ds.sort((p,q)=>p[0]-q[0]); let c=0;
    for(let m=0;m<ds.length&&c<CAP;m++){ const d=ds[m][0],j=ds[m][1]; if(m>=2&&d>TH)break;
      const key=i<j?i+'-'+j:j+'-'+i; if(seen.has(key)){c++;continue;} seen.add(key);
      edges.push({a:i,b:j,tint:Math.random()<.82?[60,240,190]:[150,120,255]}); c++; } }
  document.getElementById('badge').textContent = `${names.length} kỹ năng • ${edges.length} vector`;
}
buildNodes(['get_video_info','detect_scenes']);

const STATES={
  idle:      {rotSpeed:.0018, energy:.28, breath:.05, jitter:.15, mood:[80,246,200],  edge:.26, label:'Đang chờ'},
  listening: {rotSpeed:.004,  energy:.55, breath:.10, jitter:.5,  mood:[79,227,255],  edge:.40, label:'Sẵn sàng'},
  thinking:  {rotSpeed:.011,  energy:.82, breath:.06, jitter:.9,  mood:[150,110,255], edge:.52, label:'Đang suy nghĩ…'},
  speaking:  {rotSpeed:.003,  energy:.60, breath:.13, jitter:.35, mood:[120,240,220], edge:.44, label:'Đang trả lời…'},
  working:   {rotSpeed:.014,  energy:.95, breath:.08, jitter:1.0, mood:[255,150,80],  edge:.60, label:'Đang thực thi…'},
};
let state='idle', active=false;                 // active = đã được ĐÁNH THỨC (kích hoạt)
const stateLabelEl=document.getElementById('stateLabel');
function labelFor(){
  if(state==='idle')      return active ? 'Sẵn sàng' : 'Đang chờ';
  if(state==='listening') return 'Sẵn sàng';
  return STATES[state].label;
}
function updateLabel(){ stateLabelEl.textContent = labelFor(); }
const P={rotSpeed:.0018,energy:.28,breath:.05,jitter:.15,edge:.26,mood:[80,246,200],audio:0,flash:[0,0,0],flashAmt:0};
function setState(s){ if(!STATES[s])return; state=s; const T=STATES[s];
  updateLabel();
  const dot=document.getElementById('dot'); dot.style.background=rgba(T.mood,1); dot.style.boxShadow=`0 0 10px ${rgba(T.mood,1)}`; }
function flash(color){ P.flash=color; P.flashAmt=1; }

let audioCtx,analyser,micBuf,micReady=false,boundarySpike=0;
async function initMic(){ if(micReady)return true;
  try{ const st=await navigator.mediaDevices.getUserMedia({audio:true});
    audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    const src=audioCtx.createMediaStreamSource(st); analyser=audioCtx.createAnalyser(); analyser.fftSize=256;
    micBuf=new Uint8Array(analyser.frequencyBinCount); src.connect(analyser); micReady=true;
  }catch(e){ micReady=false; } return micReady; }
function micLevel(){ if(!micReady)return 0; analyser.getByteTimeDomainData(micBuf);
  let s=0; for(let i=0;i<micBuf.length;i++){ const v=(micBuf[i]-128)/128; s+=v*v; } return Math.min(1,Math.sqrt(s/micBuf.length)*3.6); }
function talkLevel(t){ const syl=Math.max(0,Math.sin(t*4.6+Math.sin(t*1.9)*2.2)); const tre=.5+.5*Math.sin(t*12);
  return Math.min(1,(.2+.8*syl)*(.55+.45*tre)); }

let rotY=0,rotX=-.3,drag=false,lx=0,ly=0;
canvas.addEventListener('mousedown',e=>{drag=true;lx=e.clientX;ly=e.clientY;});
window.addEventListener('mouseup',()=>drag=false);
window.addEventListener('mousemove',e=>{ if(drag){ rotY+=(e.clientX-lx)*.006; rotX+=(e.clientY-ly)*.006; rotX=Math.max(-1.3,Math.min(1.3,rotX)); lx=e.clientX; ly=e.clientY; }});
const CAM=3.0;
function proj(x,y,z,Reff){ const cyy=Math.cos(rotY),syy=Math.sin(rotY); let X=x*cyy+z*syy,Z=-x*syy+z*cyy,Y=y;
  const cxx=Math.cos(rotX),sxx=Math.sin(rotX); const Y2=Y*cxx-Z*sxx,Z2=Y*sxx+Z*cxx; const s=(CAM/(CAM-Z2))*Reff;
  return {sx:cx+X*s,sy:cy+Y2*s,d:(Z2+1)/2}; }

let t=0;
function frame(){
  t+=.016;
  const T=STATES[state];
  const L=.06;
  P.rotSpeed+=(T.rotSpeed-P.rotSpeed)*L; P.energy+=(T.energy-P.energy)*L;
  P.breath+=(T.breath-P.breath)*L; P.jitter+=(T.jitter-P.jitter)*L; P.edge+=(T.edge-P.edge)*L;
  for(let i=0;i<3;i++) P.mood[i]+=(T.mood[i]-P.mood[i])*L;
  let at=0; if(state==='listening') at=micReady?micLevel():.35+.28*Math.abs(Math.sin(t*6));
  else if(state==='speaking') at=Math.max(talkLevel(t),boundarySpike);
  boundarySpike*=.86; P.audio+=(at-P.audio)*.35;

  if(!drag) rotY+=P.rotSpeed;
  const pump=P.audio, breath=P.breath*Math.sin(t*1.8)+pump*.20;
  const Reff=R*(1+breath);

  ctx.globalCompositeOperation='source-over';
  const bg=ctx.createRadialGradient(cx,cy,0,cx,cy,Math.max(W,H)*.75);
  bg.addColorStop(0,'#0a1022'); bg.addColorStop(.5,'#050912'); bg.addColorStop(1,'#02030a');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
  ctx.globalCompositeOperation='lighter';

  const halo=ctx.createRadialGradient(cx,cy,0,cx,cy,Reff*1.7);
  halo.addColorStop(0,rgba(P.mood,.10+.16*P.energy+pump*.12)); halo.addColorStop(.6,rgba(P.mood,.05)); halo.addColorStop(1,rgba(P.mood,0));
  ctx.fillStyle=halo; ctx.beginPath(); ctx.arc(cx,cy,Reff*1.7,0,6.2832); ctx.fill();

  for(let e=0;e<edges.length;e++){ const a=nodes[edges[e].a],b=nodes[edges[e].b];
    const pa=proj(a.x,a.y,a.z,Reff),pb=proj(b.x,b.y,b.z,Reff),dep=(pa.d+pb.d)/2;
    ctx.strokeStyle=rgba(edges[e].tint,(.04+P.edge*dep)); ctx.lineWidth=.6+dep*.8;
    ctx.beginPath(); ctx.moveTo(pa.sx,pa.sy); ctx.lineTo(pb.sx,pb.sy); ctx.stroke(); }

  const jj=P.jitter*.02*(1+pump);
  for(let k=0;k<DUST.length;k++){ const p=DUST[k];
    const dx=p.x+Math.sin(t*1.3+p.jx)*jj, dy=p.y+Math.cos(t*1.1+p.jy)*jj, dz=p.z+Math.sin(t*1.7+p.jx)*jj;
    const pr=proj(dx,dy,dz,Reff), tw=.6+.4*Math.sin(t*1.6+p.tw);
    drawGlow(p.ci,pr.sx,pr.sy,(1.4+3.2*pr.d)*p.sz,p.base*tw*(.35+.65*pr.d)*(.8+.5*P.energy)); }

  for(let o=0;o<ORBS.length;o++){ const v=ORBS[o],pr=proj(v[0],v[1],v[2],Reff), pulse=.85+.15*Math.sin(t*1.2+o)+pump*.5;
    drawGlow(5,pr.sx,pr.sy,R*(.16+.30*pr.d)*pulse,(.10+.5*pr.d)*(.7+.5*P.energy)); }

  for(let i=0;i<nodes.length;i++){ const nd=nodes[i],pr=proj(nd.x,nd.y,nd.z,Reff); nd.sx=pr.sx; nd.sy=pr.sy; nd.d=pr.d;
    const w=nd.real?1:.5, g=(nd.real?7:4)+6*nd.d;
    drawGlow(nd.ci,nd.sx,nd.sy,g*(1+pump*.3),(.4+.5*nd.d)*w);
    drawGlow(5,nd.sx,nd.sy,(nd.real?2.6:1.6)+1.4*nd.d,(.5+.4*nd.d)*w); }

  drawGlow(5,cx,cy,R*(.05+.05*P.energy)+R*pump*.14,.5+.5*P.energy+pump*.5);
  const mg=ctx.createRadialGradient(cx,cy,0,cx,cy,R*.5);
  mg.addColorStop(0,rgba(P.mood,.5+.4*pump)); mg.addColorStop(.5,rgba(P.mood,.12)); mg.addColorStop(1,rgba(P.mood,0));
  ctx.fillStyle=mg; ctx.beginPath(); ctx.arc(cx,cy,R*.5,0,6.2832); ctx.fill();

  ctx.globalCompositeOperation='source-over'; ctx.textBaseline='middle';
  for(let i=0;i<nodes.length;i++){ const nd=nodes[i]; if(!nd.name||nd.d<.62)continue;
    ctx.font='11px "Segoe UI",system-ui,sans-serif'; ctx.shadowColor='rgba(0,0,0,.85)'; ctx.shadowBlur=4;
    ctx.fillStyle=rgba(COLORS[nd.ci],.4+.5*nd.d); ctx.fillText(nd.name,nd.sx+9,nd.sy); ctx.shadowBlur=0; }

  if(P.flashAmt>.01){ ctx.globalCompositeOperation='lighter';
    const f=ctx.createRadialGradient(cx,cy,0,cx,cy,Math.max(W,H)*.6);
    f.addColorStop(0,rgba(P.flash,.5*P.flashAmt)); f.addColorStop(1,rgba(P.flash,0));
    ctx.fillStyle=f; ctx.fillRect(0,0,W,H); P.flashAmt*=.94; }

  requestAnimationFrame(frame);
}
setState('idle'); requestAnimationFrame(frame);

// =====================================================================
//  Hội thoại
// =====================================================================
const inp=document.getElementById('inp'), transcript=document.getElementById('transcript');
let ttsOn=true, idleTimer=null;
let busy=false, lastReady=0;
function setBusy(b){ busy=b; if(!b) lastReady=Date.now(); }
const api=(p,b)=>fetch(p,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b||{})}).then(r=>r.json());
function showTranscript(){ transcript.classList.remove('hidden'); }
// chỉ tự cuộn xuống đáy khi người dùng đang ở gần đáy → giữ được vị trí khi họ cuộn lên đọc lại
function nearBottom(){ return transcript.scrollHeight - transcript.scrollTop - transcript.clientHeight < 80; }
function scroll(force){ if(force || nearBottom()) transcript.scrollTop=transcript.scrollHeight; }
// cuộn bằng con lăn chuột không làm ảnh hưởng phần nền phía sau
transcript.addEventListener('wheel', e=>{ e.stopPropagation(); }, {passive:true});
function bubble(text,me){ showTranscript(); const r=document.createElement('div'); r.className='row '+(me?'me':'bot');
  const b=document.createElement('div'); b.className='bubble'; b.textContent=text; r.appendChild(b); transcript.appendChild(r); scroll(me); return b; }
function botRow(){ showTranscript(); const r=document.createElement('div'); r.className='row bot'; transcript.appendChild(r); return r; }
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function goIdle(){ active=false; setState('idle'); setBusy(false); }   // hết phiên -> quay lại "Đang chờ"

// giọng nói ra
function pickVoice(){
  const vs=speechSynthesis.getVoices()||[];
  return vs.find(v=>/hoai\s*_?my/i.test(v.name))                                  // Microsoft HoaiMy (Natural)
      || vs.find(v=>/vi([-_]|$)/i.test(v.lang)&&/natural|online|neural/i.test(v.name))
      || vs.find(v=>/vi([-_]|$)/i.test(v.lang)) || null;
}
let srvTTS=true;           // giọng HoaiMy từ server (edge-tts); hỏng thì tự rơi về giọng trình duyệt
let curAudio=null;
function speakBrowser(text,done){
  if(!('speechSynthesis'in window)){ done(); return; }
  speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text);
  const vi=pickVoice(); if(vi)u.voice=vi; u.lang=vi?vi.lang:'vi-VN'; u.rate=1.18;
  u.onboundary=()=>{ boundarySpike=1; };
  u.onend=done; u.onerror=done;
  speechSynthesis.speak(u);
}
async function speak(text,after){
  if(!ttsOn||!text){ if(after)after(); else goIdle(); return; }
  if(curAudio){ try{curAudio.pause();}catch(_){} curAudio=null; }
  if('speechSynthesis'in window) speechSynthesis.cancel();
  setState('speaking'); setBusy(true);
  const done=()=>{ curAudio=null; if(after)after(); else goIdle(); };
  if(srvTTS){
    let r=null;
    try{
      r=await fetch('/api/tts',{method:'POST',headers:{'Content-Type':'application/json'},
                                body:JSON.stringify({text:String(text).slice(0,800)})});
    }catch(e){ console.warn('[tts] không gọi được server:',e); r=null; }
    if(r&&r.ok){
      try{
        const a=new Audio(URL.createObjectURL(await r.blob()));
        curAudio=a; a.onended=done;
        a.onerror=e=>{ console.warn('[tts] audio lỗi:',e); speakBrowser(text,done); };
        const tick=setInterval(()=>{ if(!curAudio){clearInterval(tick);return;} boundarySpike=1; },180);
        a.onpause=()=>clearInterval(tick);
        await a.play(); return;            // giọng HoaiMy từ server OK
      }catch(e){
        // autoplay bị chặn... — KHÔNG tắt srvTTS, chỉ fallback lần này
        console.warn('[tts] không phát được audio (autoplay?):',e);
        speakBrowser(text,done); return;
      }
    }else if(r){
      let msg=''; try{ msg=(await r.json()).error||''; }catch(_){}
      console.warn('[tts] server trả lỗi:',r.status,msg);
      srvTTS=false;                        // server TTS hỏng thật → lần sau khỏi thử
      bubble('⚠️ TTS server lỗi: '+(msg||r.status)+' — tạm dùng giọng trình duyệt. Mở 127.0.0.1:8765/api/tts-check để xem chi tiết.',false);
    }else{ srvTTS=false; }
  }
  speakBrowser(text,done);
}
function say(text){ bubble(text,false); if(ttsOn){ speak(text); } else { setState('speaking'); clearTimeout(idleTimer); idleTimer=setTimeout(goIdle,900); } }

// ===== Giọng nói vào: TỪ KHOÁ ĐÁNH THỨC (rảnh tay) =====
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
const micBtn=document.getElementById('mic');
const HINT_WAIT='Đang chờ · gọi “Javis / Em ơi/ Tùng ơi / Xin chào”';
const WAKES=['javis','jarvis','em ơi','em ei','em ê','yên nhi','yến nhi','yên như','yên nhí','tùng ơi','tùng ei','tùng',
  'xin chào','chào javis','chào em','ê javis','ơi javis','gia vít','gia vis','gia vi','da vít','za vít','javit'];
function norm(s){ return (s||'').toLowerCase().normalize('NFKD').replace(/[̀-ͯ]/g,'').replace(/đ/g,'d').replace(/[^0-9a-z\s]/g,'').replace(/\s+/g,' ').trim(); }
const WAKES_N=WAKES.map(norm);
let rec=null, wakeOn=false, armed=false, armTimer=null;
function hint(txt){ const el=document.getElementById('wakehint'); el.textContent=txt; el.style.opacity=txt?'1':'0'; }
function parseUtterance(raw){
  const words=raw.trim().split(/\s+/), low=words.map(norm);
  for(let i=0;i<words.length;i++){ for(let len=Math.min(3,words.length-i); len>=1; len--){
    if(WAKES_N.includes(low.slice(i,i+len).join(' '))) return {wake:true, rest:words.slice(i+len).join(' ')}; } }
  return {wake:false, rest:raw};
}
function disarm(){ armed=false; clearTimeout(armTimer); micBtn.classList.remove('rec'); }
function arm(){ armed=true; active=true; clearTimeout(armTimer); micBtn.classList.add('rec'); if(!busy)setState('listening'); hint('Nghe rồi — mời bạn nói lệnh…');
  armTimer=setTimeout(()=>{ disarm(); active=false; if(wakeOn&&!busy){ setState('idle'); hint(HINT_WAIT); } }, 12000); }
function handleSpeech(text){
  if(busy || Date.now()-lastReady < 600) return;
  const raw=(text||'').trim(); if(!raw) return;
  const u=parseUtterance(raw);
  if(u.wake){ const rest=u.rest.replace(/^[\s,.:!?-]+/,'').trim();
    if(rest){ active=true; disarm(); inp.value=rest; send(); } else { arm(); } }
  else if(armed){ active=true; disarm(); inp.value=raw; send(); }
  else { hint('Nghe: “'+raw+'” · gọi “Javis / Em ơi …” để kích hoạt'); }
}
if(SR){
  rec=new SR(); rec.lang='vi-VN'; rec.continuous=true; rec.interimResults=false; rec.maxAlternatives=1;
  rec.onresult=e=>{ for(let i=e.resultIndex;i<e.results.length;i++){ if(e.results[i].isFinal) handleSpeech(e.results[i][0].transcript); } };
  rec.onerror=ev=>{ if(ev.error==='not-allowed'||ev.error==='service-not-allowed'){ wakeOn=false; micBtn.classList.remove('on','rec'); hint(''); bubble('Chưa cấp quyền micro. Hãy bấm "Cho phép" khi trình duyệt hỏi rồi bật lại 🎙️.',false); } };
  rec.onend=()=>{ if(wakeOn){ setTimeout(()=>{ try{ rec.start(); }catch(_){} }, 250); } };
  micBtn.onclick=async()=>{
    wakeOn=!wakeOn;
    if(wakeOn){ await initMic(); try{ rec.start(); }catch(_){}
      micBtn.classList.add('on'); micBtn.title='Đang luôn nghe — bấm để tắt'; active=false; hint(HINT_WAIT); if(!busy)setState('idle'); }
    else { disarm(); wakeOn=false; active=false; try{ rec.stop(); }catch(_){} micBtn.classList.remove('on','rec'); micBtn.title='Bật nghe rảnh tay'; hint(''); goIdle(); }
  };
} else { micBtn.onclick=()=>bubble('Trình duyệt không hỗ trợ nhận giọng nói (hãy dùng Chrome).',false); }

// logs
function cls(l){ return l.startsWith('[✓]')?'lg-ok':l.startsWith('[✗]')?'lg-no':l.startsWith('[!]')?'lg-warn':l.startsWith('[+]')?'lg-add':l.startsWith('[>]')?'lg-run':l.startsWith('[~]')?'lg-fix':l.startsWith('[TASK]')?'lg-task':'lg-dim'; }
function renderLogs(card,logs){ let pre=card.querySelector('pre.logs'); if(!pre){ pre=document.createElement('pre'); pre.className='logs'; card.appendChild(pre); }
  pre.innerHTML=''; (logs||[]).forEach(l=>{ const s=document.createElement('span'); s.className=cls(l); s.textContent=l+'\n'; pre.appendChild(s); }); scroll(); }

// kế hoạch
function renderPlan(data){ const r=botRow(); const card=document.createElement('div'); card.className='card';
  const steps=(data.steps||[]).map((s,i)=>`<li><span class="n">${i+1}</span><span class="t">${esc(s)}</span></li>`).join('');
  card.innerHTML=`<div class="tag">Kế hoạch — chờ duyệt</div><h3>${esc(data.task)}</h3><ul class="steps">${steps}</ul>
    <div class="acts"><button class="btn ok">✅ Đồng ý</button><button class="btn no">✖ Từ chối</button><a class="open" href="${data.plan_url}" target="_blank">Mở ↗</a></div>`;
  r.appendChild(card); scroll(); const [ok,no]=card.querySelectorAll('button');
  ok.onclick=()=>approve(data.task,ok,no,card,data.steps); no.onclick=()=>{ ok.disabled=no.disabled=true; api('/api/reject',{task:data.task}); goIdle(); };
  goIdle();
}
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
function appendLogs(card,logs){ let pre=card.querySelector('pre.logs'); if(!pre){ pre=document.createElement('pre'); pre.className='logs'; card.appendChild(pre); }
  (logs||[]).forEach(l=>{ const s=document.createElement('span'); s.className=cls(l); s.textContent=l+'\n'; pre.appendChild(s); }); scroll(); }
function finishTask(res,card){
  if(res.needs_input && res.needs_input.length){ flash([255,200,90]);
    bubble('❓ '+(res.ask||'Mình cần thêm thông tin để tiếp tục.'),false);
    speak(res.ask||'Mình cần thêm thông tin.'); inp.focus(); return; }
  const good=res.success; flash(good?[80,246,150]:[255,90,90]);
  const summary=good?`✅ ${res.skill}${res.generated?' (mới sinh)':''}: `+brief(res.result):`❌ Thất bại: `+brief(res.error);
  bubble(summary,false); speak(good?`Xong. ${plain(res.result)}`:'Tác vụ thất bại.'); }
async function approve(task,ok,no,card,steps){ ok.disabled=no.disabled=true; setState('working'); setBusy(true);
  const start=await api('/api/approve',{task,steps});
  if(!start.job){ renderLogs(card,start.logs); finishTask(start,card); return; }   // server cũ
  let from=0, res=null, miss=0;
  while(true){
    let j=null;
    try{ j=await fetch('/api/job?id='+start.job+'&from='+from).then(r=>r.json()); }
    catch(_){ if(++miss>30){ break; } await sleep(2000); continue; }   // mạng chớp: job vẫn chạy, thử lại
    miss=0;
    if(j.error){ break; }
    if(j.logs && j.logs.length){ appendLogs(card,j.logs); from=j.total; }
    if(j.status==='done'){ res=j.result; break; }
    await sleep(1000);
  }
  finishTask(res||{success:false,error:'Mất kết nối tới job (server có thể vẫn đang chạy — xem cửa sổ console).'},card); }
function brief(v){ if(v==null)return''; const s=(typeof v==='string')?v:JSON.stringify(v); return s.length>420?s.slice(0,420)+'…':s; }
function plain(v){ if(v==null)return''; return (typeof v==='string')?v:JSON.stringify(v); }

// gửi
async function send(){ const text=inp.value.trim(); if(!text)return; bubble(text,true); inp.value='';
  setState('thinking'); setBusy(true); const tr=botRow(); tr.innerHTML='<div class="bubble">…</div>';
  let data; try{ data=await api('/api/message',{text}); }catch(e){ tr.querySelector('.bubble').textContent='Lỗi kết nối: '+e; goIdle(); return; }
  tr.remove();
  if(data.mode==='plan'){ renderPlan(data); } else { say(data.reply||'…'); } }
document.getElementById('send').onclick=send;
inp.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); send(); }});
document.getElementById('tts').onclick=function(){ ttsOn=!ttsOn; this.classList.toggle('on',ttsOn);
  if(!ttsOn){ if('speechSynthesis'in window)speechSynthesis.cancel(); if(curAudio){ try{curAudio.pause();}catch(_){} curAudio=null; } } };

// số kỹ năng thật -> số node/vector
fetch('/api/health').then(r=>r.json()).then(d=>{ if(d&&Array.isArray(d.skills)&&d.skills.length) buildNodes(d.skills); }).catch(()=>{});
if('speechSynthesis'in window) speechSynthesis.onvoiceschanged=()=>{};
inp.focus();
</script>
